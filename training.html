<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OP TCG - Training Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(110%); } }
        .toast-in  { animation: slideIn 0.22s ease forwards; }
        .toast-out { animation: slideOut 0.22s ease forwards; }
        .sel-blue { background:#1e3a5f !important; color:#60a5fa !important; border-color:#2563eb !important; }
        .sel-green { background:#14532d !important; color:#4ade80 !important; border-color:#16a34a !important; }
        .sel-red  { background:#4c0519 !important; color:#f87171 !important; border-color:#b91c1c !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-16">

<!-- ── Toasts ── -->
<div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none w-72"></div>

<!-- ── Confirm Modal ── -->
<div id="confirmModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
    <div class="relative bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl">
        <p id="confirmMsg" class="text-slate-200 font-medium mb-6 text-center leading-relaxed text-sm whitespace-pre-line"></p>
        <div class="flex gap-3">
            <button id="confirmCancel" class="flex-1 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold transition text-sm">Cancelar</button>
            <button id="confirmOk" class="flex-1 py-2.5 rounded-xl font-black transition text-sm">Aceptar</button>
        </div>
    </div>
</div>

<div class="max-w-5xl mx-auto p-4 md:p-6">

    <!-- ── Header ── -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-2xl">
        <div class="text-center md:text-left">
            <h1 class="text-2xl font-black text-yellow-500 uppercase tracking-tighter">Training Log</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-0.5">Registro de entrenamiento en solitario</p>
        </div>
        <div class="flex flex-wrap items-center justify-center gap-2">
            <span id="headerBadge" class="text-xs bg-slate-800 px-3 py-1.5 rounded-full text-slate-400 font-mono">0 partidas</span>
            <button onclick="exportData()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-black text-xs uppercase transition border border-slate-700/50">⬇️ Descargar</button>
            <label class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-black text-xs uppercase transition border border-slate-700/50 cursor-pointer">
                ⬆️ Cargar
                <input type="file" class="hidden" accept=".json" onchange="importData(event)">
            </label>
            <a href="index.html" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl font-black text-xs uppercase transition border border-slate-700/50">⚓ Torneos</a>
        </div>
    </header>

    <!-- ── Main Tabs ── -->
    <div class="flex gap-1 mb-4 bg-slate-900 p-1 rounded-xl border border-slate-800">
        <button id="tabLog"     onclick="setView('log')"     class="flex-1 py-2 rounded-lg text-xs font-black transition bg-slate-700 text-slate-200">✏️ Registrar</button>
        <button id="tabStats"   onclick="setView('stats')"   class="flex-1 py-2 rounded-lg text-xs font-black transition text-slate-500">📊 Estadísticas</button>
        <button id="tabHistory" onclick="setView('history')" class="flex-1 py-2 rounded-lg text-xs font-black transition text-slate-500">📋 Historial</button>
    </div>

    <div id="mainContent"></div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
let matches = [];
let view = 'log', statsTab = 'general';
let expandedLider = null, expandedOpp = null;
let formTurn = null, formResult = null;
let histFilterLeader = '', histFilterOpp = '', histFilterResult = '';

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
function saveData() { localStorage.setItem('opTcgTraining', JSON.stringify(matches)); }
function loadData() {
    try { matches = JSON.parse(localStorage.getItem('opTcgTraining') || '[]'); } catch { matches = []; }
    updateHeader();
}
function getKnownLeaders() {
    const seen = new Set(matches.flatMap(m => [m.myLeader, m.oppLeader]).filter(Boolean));
    try { (JSON.parse(localStorage.getItem('opTcgHistory')||'[]')).forEach(h => (h.snapshot?.players||[]).forEach(p => { if (p.leader) seen.add(p.leader); })); } catch {}
    return [...seen].sort();
}
function updateHeader() {
    const w = matches.filter(m => m.result === 'win').length;
    const pct = matches.length ? Math.round(w / matches.length * 100) : 0;
    document.getElementById('headerBadge').textContent = `${matches.length} partida${matches.length !== 1 ? 's' : ''} · ${pct}% W`;
}

// ── VIEW ROUTING ──────────────────────────────────────────────────────────────
function setView(v) {
    view = v;
    ['log','stats','history'].forEach(t => {
        const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
        btn.className = `flex-1 py-2 rounded-lg text-xs font-black transition ${t === v ? 'bg-slate-700 text-slate-200' : 'text-slate-500'}`;
    });
    render();
}
function setStatsTab(t) { statsTab = t; expandedLider = null; expandedOpp = null; render(); }
function render() {
    const el = document.getElementById('mainContent');
    if (view === 'log')     el.innerHTML = renderLog();
    if (view === 'stats')   el.innerHTML = renderStats();
    if (view === 'history') el.innerHTML = renderHistory();
}

// ── LOG VIEW ──────────────────────────────────────────────────────────────────
function renderLog() {
    const leaders = getKnownLeaders();
    const opts = leaders.map(l => `<option value="${escapeHtml(l)}">`).join('');
    const recent = matches.slice(-10);
    const formDots = recent.map(m => `<span class="w-2 h-2 rounded-full inline-block cursor-default ${m.result==='win'?'bg-green-500':'bg-red-500'}" title="${m.result==='win'?'W':'L'} vs ${escapeHtml(m.oppLeader)}"></span>`).join('');
    let streak = 0, streakType = '';
    for (let i = matches.length - 1; i >= 0; i--) {
        if (!streak) { streakType = matches[i].result; streak = 1; }
        else if (matches[i].result === streakType) streak++;
        else break;
    }
    const streakHtml = streak > 0 ? `<span class="font-black text-sm ${streakType==='win'?'text-green-400':'text-red-400'}">${streak}${streakType==='win'?'W':'L'} racha</span>` : '';
    const today = new Date().toISOString().split('T')[0];
    const todayM = matches.filter(m => m.date.startsWith(today));
    const todayW = todayM.filter(m => m.result === 'win').length;

    return `
    <datalist id="leaderOpts">${opts}</datalist>
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-4">

        <!-- ── Form ── -->
        <div class="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-4">
            <h2 class="text-sm font-black text-yellow-500 uppercase tracking-wider">Nueva Partida</h2>

            <div>
                <label class="text-[10px] text-slate-600 uppercase tracking-widest font-black block mb-1">Tu Líder</label>
                <input id="fMyLeader" list="leaderOpts" placeholder="Ej: Luffy OP-09"
                    class="w-full bg-slate-800 p-2.5 rounded-xl outline-none border border-slate-700 focus:border-yellow-600 transition text-sm">
            </div>

            <div>
                <label class="text-[10px] text-slate-600 uppercase tracking-widest font-black block mb-1">Líder Oponente</label>
                <input id="fOppLeader" list="leaderOpts" placeholder="Ej: Enel OP-03"
                    class="w-full bg-slate-800 p-2.5 rounded-xl outline-none border border-slate-700 focus:border-yellow-600 transition text-sm">
            </div>

            <div>
                <label class="text-[10px] text-slate-600 uppercase tracking-widest font-black block mb-2">🎲 Turno inicial</label>
                <div class="flex gap-2">
                    <button id="btn1ro"  onclick="selectTurn('first')"  class="flex-1 py-2.5 rounded-xl border text-sm font-black transition bg-slate-800 text-slate-500 border-slate-700">1ro 🟦</button>
                    <button id="btn2do"  onclick="selectTurn('second')" class="flex-1 py-2.5 rounded-xl border text-sm font-black transition bg-slate-800 text-slate-500 border-slate-700">2do ⬜</button>
                </div>
            </div>

            <div>
                <label class="text-[10px] text-slate-600 uppercase tracking-widest font-black block mb-2">Resultado</label>
                <div class="flex gap-2">
                    <button id="btnWin"  onclick="selectResult('win')"  class="flex-1 py-2.5 rounded-xl border text-sm font-black transition bg-slate-800 text-slate-500 border-slate-700">🏆 Victoria</button>
                    <button id="btnLoss" onclick="selectResult('loss')" class="flex-1 py-2.5 rounded-xl border text-sm font-black transition bg-slate-800 text-slate-500 border-slate-700">💀 Derrota</button>
                </div>
            </div>

            <div>
                <label class="text-[10px] text-slate-600 uppercase tracking-widest font-black block mb-1">Notas (opcional)</label>
                <textarea id="fNotes" rows="2" placeholder="Reflexiones, jugadas clave..."
                    class="w-full bg-slate-800 p-2.5 rounded-xl outline-none border border-slate-700 focus:border-yellow-600 transition text-sm resize-none text-slate-400"></textarea>
            </div>

            <button onclick="addMatch()" class="w-full py-3 bg-yellow-600 hover:bg-yellow-500 text-slate-950 font-black rounded-xl uppercase transition text-sm">
                + Registrar Partida
            </button>
        </div>

        <!-- ── Quick Stats ── -->
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-black text-slate-500 uppercase tracking-wider">Resumen</span>
                    ${streakHtml}
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                    ${qCard(matches.length, 'Total', '#94a3b8')}
                    ${qCard(matches.filter(m=>m.result==='win').length, 'Victorias', '#4ade80')}
                    ${qCard(matches.filter(m=>m.result==='loss').length, 'Derrotas', '#f87171')}
                    ${qCard(matches.length ? Math.round(matches.filter(m=>m.result==='win').length/matches.length*100)+'%' : '—', 'Win%', matches.length ? mrColor(matches.filter(m=>m.result==='win').length, matches.length) : '#64748b')}
                </div>
                ${recent.length ? `<div class="text-[9px] text-slate-700 uppercase tracking-widest mb-1.5">Últimas ${recent.length}</div><div class="flex items-center gap-1">${formDots}</div>` : ''}
            </div>

            ${todayM.length ? `
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4">
                <div class="text-xs font-black text-slate-500 uppercase tracking-wider mb-3">📅 Hoy</div>
                <div class="grid grid-cols-3 gap-3">
                    ${qCard(todayM.length, 'Jugadas', '#94a3b8')}
                    ${qCard(todayW, 'Victorias', '#4ade80')}
                    ${qCard(todayM.length ? Math.round(todayW/todayM.length*100)+'%' : '—', 'Win%', mrColor(todayW, todayM.length))}
                </div>
            </div>` : ''}

            ${matches.length ? `
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4">
                <div class="text-xs font-black text-slate-500 uppercase tracking-wider mb-3">Últimas partidas</div>
                <div class="space-y-1">
                    ${matches.slice(-6).reverse().map(m => `
                    <div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-800/50">
                        <span class="w-2 h-2 rounded-full flex-shrink-0 ${m.result==='win'?'bg-green-500':'bg-red-500'}"></span>
                        <span class="text-xs font-bold text-yellow-400 truncate flex-1">${escapeHtml(m.myLeader||'?')}</span>
                        <span class="text-[10px] text-slate-600 flex-shrink-0">vs</span>
                        <span class="text-xs text-slate-400 truncate flex-1">${escapeHtml(m.oppLeader||'?')}</span>
                        <span class="text-[9px] flex-shrink-0 ${m.turnOrder==='first'?'text-blue-400':'text-slate-600'}">${m.turnOrder==='first'?'1ro':'2do'}</span>
                        <span class="text-[10px] font-black flex-shrink-0 ${m.result==='win'?'text-green-400':'text-red-400'}">${m.result==='win'?'W':'L'}</span>
                    </div>`).join('')}
                </div>
            </div>` : `
            <div class="bg-slate-900 border-2 border-dashed border-slate-800 rounded-2xl p-10 text-center">
                <p class="text-4xl mb-3">⚓</p>
                <p class="text-sm font-bold text-slate-600 uppercase tracking-widest">Sin partidas aún</p>
                <p class="text-xs text-slate-700 mt-1">Registra tu primera partida para ver estadísticas</p>
            </div>`}
        </div>
    </div>`;
}

function qCard(val, label, color) {
    return `<div class="bg-slate-800/50 rounded-xl p-3 text-center border border-slate-800">
        <div class="text-xl font-black" style="color:${color}">${val}</div>
        <div class="text-[9px] text-slate-600 uppercase tracking-wider mt-0.5">${label}</div>
    </div>`;
}

// ── FORM INTERACTIONS ─────────────────────────────────────────────────────────
function selectTurn(t) {
    formTurn = t;
    document.getElementById('btn1ro').className = `flex-1 py-2.5 rounded-xl border text-sm font-black transition ${t==='first'?'sel-blue':'bg-slate-800 text-slate-500 border-slate-700'}`;
    document.getElementById('btn2do').className = `flex-1 py-2.5 rounded-xl border text-sm font-black transition ${t==='second'?'sel-blue':'bg-slate-800 text-slate-500 border-slate-700'}`;
}
function selectResult(r) {
    formResult = r;
    document.getElementById('btnWin').className  = `flex-1 py-2.5 rounded-xl border text-sm font-black transition ${r==='win' ?'sel-green':'bg-slate-800 text-slate-500 border-slate-700'}`;
    document.getElementById('btnLoss').className = `flex-1 py-2.5 rounded-xl border text-sm font-black transition ${r==='loss'?'sel-red':'bg-slate-800 text-slate-500 border-slate-700'}`;
}

function addMatch() {
    const myLeader  = document.getElementById('fMyLeader').value.trim();
    const oppLeader = document.getElementById('fOppLeader').value.trim();
    const notes     = document.getElementById('fNotes').value.trim();
    if (!myLeader)   { showToast('Ingresa tu líder.', 'warning'); return; }
    if (!oppLeader)  { showToast('Ingresa el líder oponente.', 'warning'); return; }
    if (!formTurn)   { showToast('Selecciona quién fue primero.', 'warning'); return; }
    if (!formResult) { showToast('Selecciona el resultado.', 'warning'); return; }
    matches.push({ id: Date.now(), date: new Date().toISOString(), myLeader, oppLeader, turnOrder: formTurn, result: formResult, notes });
    const res = formResult;
    saveData(); updateHeader();
    document.getElementById('fMyLeader').value = '';
    document.getElementById('fOppLeader').value = '';
    document.getElementById('fNotes').value = '';
    formTurn = null; formResult = null;
    showToast(`${res==='win'?'¡Victoria!':'Derrota'} vs ${oppLeader} registrada.`, res==='win'?'success':'info');
    render();
}

async function deleteMatch(id) {
    const ok = await showConfirm('¿Eliminar esta partida?', 'Eliminar', true);
    if (!ok) return;
    matches = matches.filter(m => m.id !== id);
    saveData(); updateHeader(); render();
}

// ── STATS VIEW ────────────────────────────────────────────────────────────────
function renderStats() {
    if (!matches.length) return noDataPlaceholder('📊', 'Sin datos aún', 'Registra partidas para ver estadísticas');
    const s = buildStats();
    return `
    <div class="flex gap-1 mb-4 bg-slate-900 p-1 rounded-xl border border-slate-800">
        ${[['general','🏠 General'],['lideres','⚓ Mis Líderes'],['oponentes','🎯 Oponentes'],['matchups','⚔️ Matchups']].map(([t,l])=>`
        <button onclick="setStatsTab('${t}')" class="flex-1 py-1.5 rounded-lg text-[10px] font-black transition ${statsTab===t?'bg-slate-700 text-slate-200':'text-slate-500'}">${l}</button>`).join('')}
    </div>
    ${statsTab==='general'   ? renderGeneral(s)   : ''}
    ${statsTab==='lideres'   ? renderLideres(s)   : ''}
    ${statsTab==='oponentes' ? renderOponentes(s) : ''}
    ${statsTab==='matchups'  ? renderMatchups(s)  : ''}`;
}

function buildStats() {
    const total = matches.length;
    const wins  = matches.filter(m => m.result==='win').length;
    const firstM  = matches.filter(m => m.turnOrder==='first');
    const secondM = matches.filter(m => m.turnOrder==='second');
    const firstW  = firstM.filter(m => m.result==='win').length;
    const secondW = secondM.filter(m => m.result==='win').length;

    // Streaks
    let curStreak=0, curType='', bestWin=0, bestLoss=0, runW=0, runL=0;
    matches.forEach(m => {
        if (!curStreak) { curStreak=1; curType=m.result; }
        else if (m.result===curType) curStreak++;
        else { curStreak=1; curType=m.result; }
        if (m.result==='win')  { runL=0; runW++; bestWin=Math.max(bestWin,runW); }
        else                   { runW=0; runL++; bestLoss=Math.max(bestLoss,runL); }
    });

    // By month
    const byMonth = {};
    matches.forEach(m => {
        const k = m.date.slice(0,7);
        if (!byMonth[k]) byMonth[k]={p:0,w:0};
        byMonth[k].p++; if (m.result==='win') byMonth[k].w++;
    });

    // By weekday
    const byDay = Array(7).fill(null).map(()=>({p:0,w:0}));
    matches.forEach(m => { const d=new Date(m.date).getDay(); byDay[d].p++; if(m.result==='win')byDay[d].w++; });

    // By my leader
    const byMyLeader = {};
    matches.forEach(m => {
        const l = m.myLeader||'?';
        if (!byMyLeader[l]) byMyLeader[l]={p:0,w:0,first:0,firstW:0,second:0,secondW:0,vsOpps:{}};
        byMyLeader[l].p++; if(m.result==='win')byMyLeader[l].w++;
        if(m.turnOrder==='first'){byMyLeader[l].first++;if(m.result==='win')byMyLeader[l].firstW++;}
        else{byMyLeader[l].second++;if(m.result==='win')byMyLeader[l].secondW++;}
        const opp = m.oppLeader||'?';
        if(!byMyLeader[l].vsOpps[opp])byMyLeader[l].vsOpps[opp]={p:0,w:0,first:0,firstW:0,second:0,secondW:0};
        byMyLeader[l].vsOpps[opp].p++; if(m.result==='win')byMyLeader[l].vsOpps[opp].w++;
        if(m.turnOrder==='first'){byMyLeader[l].vsOpps[opp].first++;if(m.result==='win')byMyLeader[l].vsOpps[opp].firstW++;}
        else{byMyLeader[l].vsOpps[opp].second++;if(m.result==='win')byMyLeader[l].vsOpps[opp].secondW++;}
    });

    // By opponent
    const byOpp = {};
    matches.forEach(m => {
        const l=m.oppLeader||'?';
        if(!byOpp[l])byOpp[l]={p:0,w:0,first:0,firstW:0,second:0,secondW:0};
        byOpp[l].p++;if(m.result==='win')byOpp[l].w++;
        if(m.turnOrder==='first'){byOpp[l].first++;if(m.result==='win')byOpp[l].firstW++;}
        else{byOpp[l].second++;if(m.result==='win')byOpp[l].secondW++;}
    });

    return { total, wins, losses:total-wins, firstM, secondM, firstW, secondW, curStreak, curType, bestWin, bestLoss, byMonth, byDay, byMyLeader, byOpp };
}

function renderGeneral(s) {
    const col = mrColor(s.wins, s.total);
    const wPct = s.total ? Math.round(s.wins/s.total*100) : 0;
    const fPct = s.firstM.length  ? Math.round(s.firstW/s.firstM.length*100)   : null;
    const sPct = s.secondM.length ? Math.round(s.secondW/s.secondM.length*100) : null;
    const dayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

    const monthRows = Object.entries(s.byMonth).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,8).map(([k,v])=>{
        const pct=Math.round(v.w/v.p*100), c=mrColor(v.w,v.p);
        return `<div class="flex items-center gap-2 py-1.5 border-b border-slate-800/30">
            <span class="text-xs text-slate-400 w-16 flex-shrink-0 font-mono">${k}</span>
            <span class="text-[10px] font-mono flex-shrink-0 w-14" style="color:${c}">${v.w}W–${v.p-v.w}L</span>
            <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:${c}"></div></div>
            <span class="text-[10px] font-black w-8 text-right flex-shrink-0" style="color:${c}">${pct}%</span>
        </div>`;
    }).join('');

    const dayGrid = s.byDay.map((d,i)=>{
        if(!d.p)return`<div class="text-center"><div class="text-[9px] text-slate-600">${dayNames[i]}</div><div class="text-[10px] text-slate-800 mt-0.5">—</div></div>`;
        const pct=Math.round(d.w/d.p*100),c=mrColor(d.w,d.p);
        return`<div class="text-center"><div class="text-[9px] text-slate-500">${dayNames[i]}</div><div class="text-xs font-black mt-0.5" style="color:${c}">${pct}%</div><div class="text-[8px] text-slate-700">${d.p}p</div></div>`;
    }).join('');

    // Best / worst opponents
    const oppEntries = Object.entries(s.byOpp).filter(([,d])=>d.p>=2).sort((a,b)=>(b[1].w/b[1].p)-(a[1].w/a[1].p));
    const best3 = oppEntries.slice(0,3);
    const worst3 = oppEntries.slice(-3).reverse().filter(x=>!best3.includes(x));

    return `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Overall card -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-4">
            <div class="text-xs font-black text-slate-500 uppercase tracking-wider">Global</div>
            <div class="flex items-center gap-4">
                ${donutSvg(s.wins,s.total,col,52,19,11)}
                <div>
                    <div class="text-4xl font-black" style="color:${col}">${wPct}%</div>

// ── EXPAND / MATCHUP TOGGLES ──────────────────────────────────────────────────
function expandLider(idx)       { expandedLider = expandedLider===idx?null:idx; render(); }
function expandOpp(idx)         { expandedOpp   = expandedOpp===idx?null:idx;   render(); }
function selectMatchupLider(i)  { expandedLider = i; statsTab='matchups'; render(); }

// ── IMPORT / EXPORT ───────────────────────────────────────────────────────────
function exportData() {
    const blob = new Blob([JSON.stringify(matches, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`training_log_${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(a.href);
    showToast('Archivo exportado.', 'success');
}
function importData(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
        try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error();
            const ok = await showConfirm(`¿Importar ${data.length} partidas?\nSe agregarán a las existentes.`, 'Importar');
            if (!ok) return;
            const existingIds = new Set(matches.map(m => m.id));
            data.forEach(m => { if (!existingIds.has(m.id)) matches.push(m); });
            saveData(); updateHeader(); render();
            showToast(`${data.length} partidas importadas.`, 'success');
        } catch { showToast('Archivo inválido.', 'error'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}
async function clearAll() {
    const ok = await showConfirm(`¿Borrar las ${matches.length} partidas?\nEsta acción no se puede deshacer.`, 'Borrar todo', true);
    if (!ok) return;
    matches=[]; saveData(); updateHeader(); render();
    showToast('Historial borrado.', 'info');
}

    </div>`;
}
function mrColor(w,t) { if(!t)return'#475569'; const r=w/t; return r>0.5?'#4ade80':r===0.5?'#facc15':'#f87171'; }
function colorBar(w,t,h='h-1.5') {
    if(!t)return`<div class="${h} w-full bg-slate-800 rounded-full opacity-20"></div>`;
    const col=mrColor(w,t),pct=Math.round(w/t*100);
    return`<div class="${h} w-full bg-slate-800 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${pct}%;background:${col}"></div></div>`;
}
function donutSvg(wins,total,color,size=32,r=12,fs=7.5) {
    if(!total)return`<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e293b" stroke-width="3.5"/></svg>`;
    const circ=2*Math.PI*r, dash=(wins/total)*circ;
    return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e293b" stroke-width="3.5"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3.5"
            stroke-dasharray="${dash.toFixed(1)} ${(circ).toFixed(1)}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/>
        <text x="${size/2}" y="${size/2+fs*0.42}" text-anchor="middle" font-size="${fs}" font-weight="900" fill="${color}">${Math.round(wins/total*100)}</text>
    </svg>`;
}
function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showToast(msg, type='info', duration=3500) {
    const C={success:'bg-green-950 border-green-700/60 text-green-200',error:'bg-red-950 border-red-700/60 text-red-200',warning:'bg-yellow-950 border-yellow-700/60 text-yellow-200',info:'bg-slate-800 border-slate-600/60 text-slate-200'};
    const I={success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
    const el=document.createElement('div');
    el.className=`pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-xl border shadow-xl ${C[type]||C.info} toast-in`;
    el.innerHTML=`<span class="text-xs mt-0.5 flex-shrink-0 font-black">${I[type]||'·'}</span><span class="text-xs leading-relaxed flex-1">${escapeHtml(msg)}</span><button onclick="this.closest('div').remove()" class="text-[10px] opacity-40 hover:opacity-80 ml-1">✕</button>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(()=>{el.classList.replace('toast-in','toast-out');setTimeout(()=>el.remove(),260);},duration);
}
function showConfirm(msg, okText='Aceptar', danger=false) {
    return new Promise(resolve => {
        const modal=document.getElementById('confirmModal');
        document.getElementById('confirmMsg').textContent=msg;
        const ok=document.getElementById('confirmOk'), cx=document.getElementById('confirmCancel');
        ok.textContent=okText;
        ok.className=`flex-1 py-2.5 rounded-xl font-black transition text-sm ${danger?'bg-red-700 hover:bg-red-600 text-white':'bg-yellow-600 hover:bg-yellow-500 text-slate-950'}`;
        modal.classList.remove('hidden');
        const cleanup=()=>{modal.classList.add('hidden');ok.removeEventListener('click',yes);cx.removeEventListener('click',no);};
        const yes=()=>{cleanup();resolve(true);},no=()=>{cleanup();resolve(false);};
        ok.addEventListener('click',yes);cx.addEventListener('click',no);
    });
}
